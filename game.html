<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>KBC Quiz</title>
    <style>
     *{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background: radial-gradient(circle,#182a73,#0b0b3b,#000);
    font-family:Arial, Helvetica, sans-serif;
    color:white;
}
 

.start-screen{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.start-box{
    width:750px;
    max-width:90%;
    padding:60px;
    border:4px solid gold;
    border-radius:30px;
    text-align:center;
    background:#11184f;
    box-shadow:0 0 30px gold;
}

.start-box h1{
    color:gold;
    font-size:65px;
    margin-bottom:40px;
    text-shadow:0 0 15px yellow;
}

.start-box button{
    padding:15px 45px;
    font-size:22px;
    border:none;
    border-radius:40px;
    background:gold;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

.start-box button:hover{
    background:orange;
    transform:scale(1.1);
}



.logo{
    text-align:center;
    margin-top:20px;
}

.logo img{
    width:250px;
}

.header{
    background:#1c237e;
    color:gold;
    text-align:center;
    padding:15px;
    font-size:30px;
    font-weight:bold;
    border-top:2px solid gold;
    border-bottom:2px solid gold;
    letter-spacing:2px;
}

 

.lifelines{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:15px;
    margin:20px;
}

.lifelines button{
    background:#002b80;
    color:white;
    border:2px solid gold;
    padding:12px 20px;
    border-radius:30px;
    cursor:pointer;
    transition:.3s;
    font-weight:bold;
}

.lifelines button:hover{
    background:gold;
    color:black;
}

 

.question-box{
    width:65%;
    margin:30px auto;
    background:#121b63;
    border:3px solid gold;
    border-radius:20px;
    padding:30px;
    box-shadow:0 0 20px rgba(255,215,0,.5);
}

#lblQuestionNo{
    display:block;
    text-align:center;
    font-size:24px;
    margin-bottom:25px;
    color:white;
}
 

.option{
    display:flex;
    align-items:center;
    gap:15px;
    margin:15px 0;
    padding:15px;
    background:#1b237e;
    border:2px solid transparent;
    border-radius:12px;
    cursor:pointer;
    transition:.3s;
}

.option:hover{
    background:gold;
    color:black;
    border-color:white;
    transform:scale(1.02);
}

.option input{
    transform:scale(1.4);
    cursor:pointer;
}

.option label{
    cursor:pointer;
    width:100%;
    font-size:20px;
}

 

.prizes{
    position:absolute;
    top:160px;
    right:25px;
    width:220px;
    background:#10184e;
    border:3px solid gold;
    border-radius:15px;
    padding:15px;
    box-shadow:0 0 15px gold;
}

.prizes ul{
    padding:0;
}

.prizes li{
    list-style:none;
    padding:8px;
    border-bottom:1px solid rgba(255,255,255,.2);
    text-align:center;
    transition:.3s;
}

.prizes li:hover{
    background:gold;
    color:black;
    font-weight:bold;
}

 

.submit-btn{
    display:block;
    margin:30px auto;
    padding:15px 40px;
    background:limegreen;
    border:none;
    border-radius:30px;
    font-size:20px;
    cursor:pointer;
    font-weight:bold;
    transition:.3s;
}

.submit-btn:hover{
    background:green;
    color:white;
    transform:scale(1.05);
}

 
.hide{
    display:none;
}

 

@media(max-width:900px){

    .question-box{
        width:95%;
    }

    .prizes{
        position:static;
        width:95%;
        margin:20px auto;
    }

    .header{
        font-size:22px;
    }

    .start-box h1{
        font-size:45px;
    }

    .option label{
        font-size:18px;
    }
}

  <body>
    <div id="startScreen" class="start-screen">
      <div class="start-box">
        <h1>KBC Quiz</h1>
        <button onclick="startGame(); loadQuestion();">Start</button>
      </div>
    </div>

    <div id="gameScreen" class="hide">

       <div class="logo">
        <img src="images/kbc.png" width="350px" />
      </div>

      <div class="header">Kaun Banega Crorepati</div>

      <div class="lifelines">
        <button>50:50</button>
        <button>Audience Poll</button>
        <button>Phone a Friend</button>
        <button>Walk Away</button>
      </div>

      <div class="question-box">

        <label id="lblQuestionNo"> 1. In the film 'Mr India', Mogambo was looking for a formula to enable </label>
       

        <div class="option">
          <input type="radio"  name="option" id="rda" />
          <label id="lbla" for="rda">Option A</label>
        </div>

        <div class="option">
          <input type="radio" name="option" id="rdb" />
          <label id="lblb" for="rdb">Option B</label>
        </div>

        <div class="option">
          <input type="radio" name="option" id="rdc" />
          <label id="lblc" for="rdc">Option C</label>
        </div>

        <div class="option">
          <input type="radio" name="option" id="rdd"/>
          <label id="lbld" for="rdd" >Option D</label>
        </div>

      </div>

      <div class="prizes">
        <ul>
          <li>₹1,000</li>
          <li>₹2,000</li>
          <li>₹3,000</li>
          <li>₹5,000</li>
          <li>₹10,000</li>
          <li>₹20,000</li>
          <li>₹40,000</li>
          <li>₹80,000</li>
          <li>₹1,60,000</li>
          <li>₹3,20,000</li>
          <li>₹6,40,000</li>
          <li>₹12,50,000</li>
          <li>₹25,00,000</li>
          <li>₹50,00,000</li>
          <li>₹1 Crore</li>
        </ul>
      </div>

      <button class="submit-btn" onclick="f();">Check Answer</button>
    </div>

 <script>
  let questionNo=0;
  let currentQuestion=null;
     const questions = [
    {
        question: "What is the capital of Uttar Pradesh?",

    },
    {

        question: "Which is the national animal of India?",

    },
    {
        question: "Which gas do plants absorb from the atmosphere?",

    {

    },
    {
        question: "Who wrote the Indian National Anthem?",

        question: "Which company developed Java?",

        answer: 4
    }
];



      let questionno = 1;
      const rda = document.querySelector("#rda");
      const rdb = document.querySelector("#rdb");
      const rdc = document.querySelector("#rdc");
      const rdd = document.querySelector("#rdd");
      const rde = document.querySelector("#rde");

      const lblqno = document.querySelector("#lblQuestionNo");

      const lbla = document.querySelector("#lbla");
      const lblb = document.querySelector("#lblb");
      const lblc = document.querySelector("#lblc");
      const lbld = document.querySelector("#lbld");

      function f() {
        let givenanswer = getSelectedAnswer();
        
          if(givenanswer == 0){
            alert("Please Select answer");
             return;
          }
          console.log(givenanswer);
          
          //  alert(currentQuestion.answer);
            if(currentQuestion.answer == givenanswer){
              alert("Correct answer");
              questionNo++;
              loadQuestion();
            }else{
              alert("Wrong answer");
            }
       }

       function loadQuestion(){
          currentQuestion=questions[questionNo];
           lblqno.textContent=currentQuestion.question;
           lbla.textContent=currentQuestion.a;
           lblb.textContent=currentQuestion.b;
           lblc.textContent=currentQuestion.c;
           lbld.textContent=currentQuestion.d;        
       }

      function startGame() {
        document.querySelector("#startScreen").classList.add("hide");
        document.querySelector("#gameScreen").classList.remove("hide");
      }
      function getSelectedAnswer() {
        if (rda.checked) return 1;
        if (rdb.checked) return 2;
        if (rdc.checked) return 3;
        if (rdd.checked) return 4;
        return 0;
      }

       
    </script>
  </body>
</html>
