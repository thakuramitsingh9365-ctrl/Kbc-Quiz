<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            background: none;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container{
             background: white;
             width: 350px;
             padding: 30px;
             border-radius: 12px;
             box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
             text-align: center;
        }

        h2{
            margin-bottom: 20px;
            color: #333;
            font-size: 28px;
        }
        label{
           float: left;
           font-weight: bold;
           margin-bottom: 5px;
           color: #555;

        }
        input[type="text"],
        input[type="password"]{
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
            transition: 0.3s;
        }

        input[type="text"]:hover,
        input[type="password"]:hover{
             border-color: rgb(85, 85, 239);

        }

        input[type="submit"] {
            width: 100%;
            padding: 12px;
            background: rgb(30, 30, 241);
            border: none;
            color: white;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        input[type="submit"]:hover{
            background: #06307f;
        }

        p{
            margin-top: 15px;
            color: #333;
            font-size: 13px;
        }
        a{
            color: blue;
            font-weight: bold;
            text-decoration: none;
        }
        a:hover{
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
      <h2>Login</h2>

    <form class="id">
        <label >Username:</label>
        <input type="text" placeholder="Enter your username" required>
        <br><br>

        <label for="">Password:</label>
        <input type="password" placeholder="Enter your password" required>
        <br><br>

        <input type="submit" value="Login">
        <!-- <a href="">Forgot Password?</a> -->
        <br><br>

      </form>
          <p>New account? <a href="signup.html">Signup here</a></p>
   </div>
</body>
</html>
