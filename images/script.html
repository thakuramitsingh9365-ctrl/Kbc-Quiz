<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function doSwap(){
            var x=document.getElementById("ta");
            var y=document.getElementById("tb");
            var t=x.value;
            x.value=y.value;
            y.value=t;
        }
    </script>
</head>
<body>
    A<input type="text" id="ta"/>
    <br/>
    B<input type="text" id="tb"/>
    <br/>
    <input type="button" onclick="doSwap()" value="Swap"/>
</body>
</html>
