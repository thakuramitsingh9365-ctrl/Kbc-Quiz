<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>KBC Quiz</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background: radial-gradient(circle, #182a73, #0b0b3b, #000);
        font-family: Arial, Helvetica, sans-serif;
        color: white;
      }

      .start-screen {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .start-box {
        width: 750px;
        max-width: 90%;
        padding: 60px;
        border: 4px solid gold;
        border-radius: 30px;
        text-align: center;
        background: #11184f;
        box-shadow: 0 0 30px gold;
      }

      .start-box h1 {
        color: gold;
        font-size: 65px;
        margin-bottom: 40px;
        text-shadow: 0 0 15px yellow;
      }

      .start-box button {
        padding: 15px 45px;
        font-size: 22px;
        border: none;
        border-radius: 40px;
        background: gold;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
      }

      .start-box button:hover {
        background: orange;
        transform: scale(1.1);
      }

      .logo {
        text-align: center;
        margin-top: 20px;
      }

      .logo img {
        width: 250px;
      }

      .header {
        background: #1c237e;
        color: gold;
        text-align: center;
        padding: 15px;
        font-size: 30px;
        font-weight: bold;
        border-top: 2px solid gold;
        border-bottom: 2px solid gold;
        letter-spacing: 2px;
      }

      .lifelines {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 15px;
        margin: 20px;
      }

      .lifelines button {
        background: #002b80;
        color: white;
        border: 2px solid gold;
        padding: 12px 20px;
        border-radius: 30px;
        cursor: pointer;
        transition: 0.3s;
        font-weight: bold;
      }

      .lifelines button:hover {
        background: gold;
        color: black;
      }

      .question-box {
        width: 65%;
        margin: 30px auto;
        background: #121b63;
        border: 3px solid gold;
        border-radius: 20px;
        padding: 30px;
        box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
      }

      #lblQuestionNo {
        display: block;
        text-align: center;
        font-size: 24px;
        margin-bottom: 25px;
        color: white;
      }

      .option {
        display: flex;
        align-items: center;
        gap: 15px;
        margin: 15px 0;
        padding: 15px;
        background: #1b237e;
        border: 2px solid transparent;
        border-radius: 12px;
        cursor: pointer;
        transition: 0.3s;
      }

      .option:hover {
        background: gold;
        color: black;
        border-color: white;
        transform: scale(1.02);
      }

      .option input {
        transform: scale(1.4);
        cursor: pointer;
      }

      .option label {
        cursor: pointer;
        width: 100%;
        font-size: 20px;
      }

      .option.correct {
        background: green;
        color: white !important;
        border-color: white !important;
      }

      .option.wrong {
        background: red !important;
        color: white !important;
        border-color: white !important;
      }
      .prizes {
        position: absolute;
        top: 160px;
        right: 25px;
        width: 220px;
        background: #10184e;
        border: 3px solid gold;
        border-radius: 15px;
        padding: 15px;
        box-shadow: 0 0 15px gold;
      }

      .prizes ul {
        padding: 0;
      }

      .prizes li {
        list-style: none;
        padding: 8px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        text-align: center;
        transition: 0.3s;
      }

      .prizes li:hover,
      .prizes li.active {
        background: gold;
        color: black;
        font-weight: bold;
      }

      .submit-btn {
        display: block;
        margin: 30px auto;
        padding: 15px 40px;
        background: limegreen;
        border: none;
        border-radius: 30px;
        font-size: 20px;
        cursor: pointer;
        font-weight: bold;
        transition: 0.3s;
      }

      .submit-btn:hover {
        background: green;
        color: white;
        transform: scale(1.05);
      }

      .hide {
        display: none;
      }

      #speakBtn {
        display: flex;
        margin: 30px auto;
        padding: 15px 40px;
        background: limegreen;
        border: none;
        border-radius: 30px;
        font-size: 20px;
        cursor: pointer;
        font-weight: bold;
        transition: 0.3s;
      }

      #speakBtn:hover {
        background: green;
        color: white;
        transform: scale(1.05);
      }

      .timer-box {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
        margin: 20px 0;
        font-size: 22px;
        font-weight: bold;
      }

      #lblTimer {
        min-width: 70px;
        padding: 8px 16px;
        border-radius: 12px;
        background: #7f1d1d;
        color: #fff;
        text-align: center;
        font-size: 28px;
      }
      @media (max-width: 900px) {
        .question-box {
          width: 95%;
        }

        .prizes {
          position: static;
          width: 95%;
          margin: 20px auto;
        }

        .header {
          font-size: 22px;
        }

        .start-box h1 {
          font-size: 45px;
        }

        .option label {
          font-size: 18px;
        }

        #lblTimer {
          font-size: 30px;
        }
      }
    </style>
  </head>

  <body>
    <div id="startScreen" class="start-screen">
      <div class="start-box">
        <h1>KBC Quiz</h1>
        <button
          onclick="
            startGame();
            loadQuestion();
            StrtTimer();">
          Start
        </button>
      </div>
    </div>

    <div id="gameScreen" class="hide">
      <div class="logo">
        <img src="images/kbc.png" width="350px" />
      </div>

      <div class="header">Kaun Banega Crorepati</div>

      <div class="lifelines">
        <button>50:50</button>
        <button>Audience Poll</button>
        <button>Phone a Friend</button>
        <button>Walk Away</button>
      </div>

      <div class="timer-box">
        <span>Time Left</span>
        <span id="lblTimer">30</span>
      </div>
      <div class="question-box">
        <label id="lblQuestionNo"></label>

        <div
          class="option"
          onclick="document.querySelector('#rda').checked = true"
        >
          <input type="radio" name="option" id="rda" />
          <label id="lbla" for="rda">Option A</label>
        </div>

        <div
          class="option"
          onclick="document.querySelector('#rdb').checked = true"
        >
          <input type="radio" name="option" id="rdb" />
          <label id="lblb" for="rdb">Option B</label>
        </div>

        <div
          class="option"
          onclick="document.querySelector('#rdc').checked = true"
        >
          <input type="radio" name="option" id="rdc" />
          <label id="lblc" for="rdc">Option C</label>
        </div>

        <div
          class="option"
          onclick="document.querySelector('#rdd').checked = true"
        >
          <input type="radio" name="option" id="rdd" />
          <label id="lbld" for="rdd">Option D</label>
        </div>
      </div>

      <div class="prizes">
        <ul>
          <li>₹1,000</li>
          <li>₹2,000</li>
          <li>₹3,000</li>
          <li>₹5,000</li>
          <li>₹10,000</li>
          <li>₹20,000</li>
          <li>₹40,000</li>
          <li>₹80,000</li>
          <li>₹1,60,000</li>
          <li>₹3,20,000</li>
          <li>₹6,40,000</li>
          <li>₹12,50,000</li>
          <li>₹25,00,000</li>
          <li>₹50,00,000</li>
          <li>₹1 Crore</li>
        </ul>
      </div>

      <button class="submit-btn" onclick="checkAnswer()">Check Answer</button>
      <button id="speakBtn" onclick="speakQuestion()">Speak Again</button>
    </div>

    <script>
      let questionNo = 0;
      let currentQuestion = null;
      let counter = 30;
      let timerId = null;

      const rewards = [
        "₹1,000",
        "₹2,000",
        "₹3,000",
        "₹5,000",
        "₹10,000",
        "₹20,000",
        "₹40,000",
        "₹80,000",
        "₹1,60,000",
        "₹3,20,000",
        "₹6,40,000",
        "₹12,50,000",
        "₹25,00,000",
        "₹50,00,000",
        "₹1 Crore",
      ];

      const questions = [
        {
          question: "What is the capital of Uttar Pradesh?",
          a: "Lucknow",
          b: "Kanpur",
          c: "Varanasi",
          d: "Agra",
          answer: 1,
        },
        {
          question: "What is the capital of Bihar?",
          a: "Gaya",
          b: "Patna",
          c: "Bhagalpur",
          d: "Muzaffarpur",
          answer: 2,
        },
        {
          question: "What is the capital of India?",
          a: "Mumbai",
          b: "New Delhi",
          c: "Kolkata",
          d: "Chennai",
          answer: 2,
        },
        {
          question: "Which planet is known as the Red Planet?",
          a: "Earth",
          b: "Jupiter",
          c: "Mars",
          d: "Venus",
          answer: 3,
        },
        {
          question: "Who is known as the Father of the Nation in India?",
          a: "Jawaharlal Nehru",
          b: "Bhagat Singh",
          c: "Subhas Chandra Bose",
          d: "Mahatma Gandhi",
          answer: 4,
        },
        {
          question: "Which is the largest ocean in the world?",
          a: "Atlantic Ocean",
          b: "Indian Ocean",
          c: "Pacific Ocean",
          d: "Arctic Ocean",
          answer: 3,
        },
        {
          question: "How many continents are there on Earth?",
          a: "5",
          b: "6",
          c: "7",
          d: "8",
          answer: 3,
        },
        {
          question: "Which language is used for styling web pages?",
          a: "HTML",
          b: "CSS",
          c: "Java",
          d: "Python",
          answer: 2,
        },
        {
          question: "Who invented the telephone?",
          a: "Alexander Graham Bell",
          b: "Thomas Edison",
          c: "Nikola Tesla",
          d: "James Watt",
          answer: 1,
        },
        {
          question: "Which is the national animal of India?",
          a: "Lion",
          b: "Elephant",
          c: "Leopard",
          d: "Tiger",
          answer: 4,
        },
        {
          question: "Which gas do plants absorb from the atmosphere?",
          a: "Oxygen",
          b: "Nitrogen",
          c: "Carbon Dioxide",
          d: "Hydrogen",
          answer: 3,
        },
        {
          question: "Which is the smallest prime number?",
          a: "1",
          b: "2",
          c: "3",
          d: "5",
          answer: 2,
        },
        {
          question: "Who wrote the Indian National Anthem?",
          a: "Premchand",
          b: "Bankim Chandra Chatterjee",
          c: "Rabindranath Tagore",
          d: "Sarojini Naidu",
          answer: 3,
        },
        {
          question: "What is the full form of CPU?",
          a: "Central Process Unit",
          b: "Central Processing Unit",
          c: "Computer Processing Unit",
          d: "Central Program Unit",
          answer: 2,
        },
        {
          question: "Which company developed Java?",
          a: "Microsoft",
          b: "Google",
          c: "Apple",
          d: "Sun Microsystems",
          answer: 4,
        },
      ];

      const lbltimer = document.querySelector("#lblTimer");

      const rda = document.querySelector("#rda");
      const rdb = document.querySelector("#rdb");
      const rdc = document.querySelector("#rdc");
      const rdd = document.querySelector("#rdd");

      const lblqno = document.querySelector("#lblQuestionNo");

      const lbla = document.querySelector("#lbla");
      const lblb = document.querySelector("#lblb");
      const lblc = document.querySelector("#lblc");
      const lbld = document.querySelector("#lbld");

      function checkAnswer() {
        let givenanswer = getSelectedAnswer();

        if (givenanswer == 0) {
          alert("Please Select an answer");
          return;
        }

        if (currentQuestion.answer == givenanswer) {
          alert("Correct answer");
          questionNo++;
          if (questionNo >= questions.length) {
            // alert("Congratulations! You completed the quiz!");
            // document.querySelector("#gameScreen").classList.add("hide");
            // document.querySelector("#startScreen").classList.remove("hide");
            // questionNo = 0;
            // return;
            clearInterval(timerId);
            alert("Congratulations! You completed the quiz!");
            resetToStart();
            return;
          }
          loadQuestion();
        } else {
          // alert("Wrong answer");
          clearInterval(timerId);
          // document.querySelector("#startScreen").classList.remove("hide");
          // document.querySelector("#gameScreen").classList.add("hide");
          alert("Wrong answer");
          resetToStart();
          // questionNo = 0;
        }
      }

      function resetToStart() {
        document.querySelector("#startScreen").classList.remove("hide");
        document.querySelector("#gameScreen").classList.add("hide");
        questionNo = 0;
      }

      function StrtTimer() {
        clearInterval(timerId);

        counter = 30;
        lbltimer.textContent = counter;

        timerId = setInterval(function () {
          counter--;
          lbltimer.textContent = counter;

          if (counter <= 0) {
            clearInterval(timerId);
            alert("Time up! KBC ended.");
            resetToStart();
          }
        }, 1000);
      }

      function loadQuestion() {
        currentQuestion = questions[questionNo];
        lblqno.textContent =
          "Q" + (questionNo + 1) + ". " + currentQuestion.question;
        lbla.textContent = currentQuestion.a;
        lblb.textContent = currentQuestion.b;
        lblc.textContent = currentQuestion.c;
        lbld.textContent = currentQuestion.d;

        rda.checked = false;
        rdb.checked = false;
        rdc.checked = false;
        rdd.checked = false;

        updatePrizeHighlight();

        StrtTimer();
        speakQuestion();
      }

      function updatePrizeHighlight() {
        const prizeItems = document.querySelectorAll(".prizes li");
        prizeItems.forEach((li) => {
          li.classList.remove("active");
        });

        if (prizeItems[questionNo]) {
          prizeItems[questionNo].classList.add("active");
          prizeItems[questionNo].scrollIntoView({
            behavior: "smooth",
            block: "nearest",
          });
        }
      }

      function startGame() {
        document.querySelector("#startScreen").classList.add("hide");
        document.querySelector("#gameScreen").classList.remove("hide");
      }

      function getSelectedAnswer() {
        if (rda.checked) return 1;
        if (rdb.checked) return 2;
        if (rdc.checked) return 3;
        if (rdd.checked) return 4;
        return 0;
      }

      function speakQuestion() {
        if (questionNo < 0 || questionNo >= questions.length) {
          return;
        }

        const q = questions[questionNo];

        const text =
          "Question for " +
          rewards[questionNo] +
          ". " +
          q.question +
          ". Option A. " +
          q.a +
          ". Option B. " +
          q.b +
          ". Option C. " +
          q.c +
          ". Option D. " +
          q.d +
          ".";

        window.speechSynthesis.cancel();

        const speech = new SpeechSynthesisUtterance(text);
        speech.lang = "en-IN";
        speech.rate = 0.85;
        speech.pitch = 1;

        window.speechSynthesis.speak(speech);
      }
    </script>
  </body>
</html>
